name: Update Live TV Playlist

on:
  # Allows you to trigger it manually from the Actions tab
  workflow_dispatch: 
  # Runs automatically every 20 minutes
  schedule:
    - cron: '10 * * * *'    

# Give the action permission to commit files back to your repo
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        # Fetch depth 0 ensures we get the full git history for a clean rebase
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests playwright

    - name: Install Playwright Browsers & OS Dependencies
      run: playwright install chromium --with-deps

    - name: Run Scraper Script
      run: python channels.py

    - name: Commit and Push Playlist
      run: |
        git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add live_tv_channels.m3u
        
        # Check if there are actually changes to commit to avoid empty commit errors
        if git diff-index --quiet HEAD --; then
          echo "No changes to playlist, skipping commit."
        else
          git commit -m "Auto-update live_tv_channels.m3u"
          
          # Pull remote changes and rebase BEFORE pushing to prevent rejection errors
          git pull --rebase origin main
          git push origin main
        fi
